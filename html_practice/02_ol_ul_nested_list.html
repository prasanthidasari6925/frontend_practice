<!DOCTYPE html>
<html>
    <head>
        <title>Nested Lists</title>
    </head>
    <body>
        <h2>My Lists</h2>
        <UL>
            <LI>Python</LI>
            <LI>HTML</LI>
            <LI>CSS</LI>
            <LI>JavaScript</LI>
        </UL>
        <ol type="i">
            <li>First Item</li>
            <li>Second Item</li>
            <li>Third Item</li>
            <li>Fourth Item</li>
            <li>Fifth Item</li>
        </ol>
        <h2>My Nested Lists</h2>
        <ul type="square">
            <li>Programming Languages
                <ol>
                    <li>Python</li>
                    <li>HTML</li>
                    <li>SQL</li>
                </ol>
            </li>
            <li>Sports
                <ol>
                    <li>Cricket</li>
                    <li>Football</li>
                    <li>Basketball</li>
                </ol>
            </li>
        </ul>
    </body>
</html>
